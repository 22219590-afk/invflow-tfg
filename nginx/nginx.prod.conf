# ── Rate limiting: máx 20 peticiones/segundo por IP ──────────────────────────
# burst=50: permite ráfagas cortas; nodelay: no encola, rechaza con 429 directamente
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── Redirige todo HTTP a HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name DOMINIO_AQUI;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name DOMINIO_AQUI;

    ssl_certificate     /etc/letsencrypt/live/DOMINIO_AQUI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO_AQUI/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Tamaño máximo de petición (evita que suban archivos enormes)
    client_max_body_size 10M;

    # Frontend (archivos estáticos)
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Login: rate limit muy estricto para evitar fuerza bruta
    location /api/v1/auth/login {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Backend (resto de endpoints)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para operaciones largas (simulaciones, sync Odoo)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
